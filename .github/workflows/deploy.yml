name: Deploy to Cloud Run

# Pulls the model bundle from GCS, bakes it into the image, and deploys the
# combined API+demo service to Cloud Run. Runs after CI passes, or manually.
# See infra/DEPLOY.md for the one-time GCP setup.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}              # e.g. us-central1
  SERVICE: echonext-shd
  REPO: echonext                              # Artifact Registry repo
  GCS_BUCKET: ${{ vars.GCS_BUCKET }}          # bucket holding the model registry
  MODEL_VERSION: ${{ vars.MODEL_VERSION }}    # e.g. v1-cnn-ens5

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write                         # for Workload Identity Federation
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Fetch model bundle from GCS
        run: |
          mkdir -p models
          gcloud storage cp "gs://${GCS_BUCKET}/models/${MODEL_VERSION}/*" models/
          ls -la models

      - name: Build & push image
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/${SERVICE}:${GITHUB_SHA::7}"
          gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --image "$IMAGE" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi --cpu 1 \
            --min-instances 0 --max-instances 2 \
            --concurrency 4 \
            --port 8080
