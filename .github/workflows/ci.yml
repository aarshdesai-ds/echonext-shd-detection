name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check src app tests
      - name: Test
        env:
          PYTHONPATH: src
        # model artifacts aren't committed; model-dependent tests self-skip,
        # so this gates code health (imports, schemas, /healthz, lint).
        run: pytest -q
